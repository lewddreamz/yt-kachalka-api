version: '3.8'

services:
  api:
    build: ./docker/api
    container_name: php-app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    networks:
      - api-network

  nginx:
    image: nginx:alpine
    container_name: nginx-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
    networks:
      - api-network

networks:
  api-network:
    driver: bridge

