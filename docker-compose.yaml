version: '3.8'

services:
  api:
    build: 
      context: ./docker/api
      dockerfile: Dockerfile
    container_name: php-app
    restart: unless-stopped
    volumes:
  # Монтируем только код (исключаем var)
      - ./:/var/www/html/:exclude=var
      # Или если exclude не поддерживается вашей версией, монтируйте только нужные файлы
      # Отдельно создаем volume для данных Symfony (кэш и логи)
      - ./var:/var/www/html/var
    networks:
      - api-network

  nginx:
    image: nginx:alpine
    container_name: nginx-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
    networks:
      - api-network

networks:
  api-network:
    driver: bridge

